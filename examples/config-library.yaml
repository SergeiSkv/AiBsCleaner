# Configuration for library code
# Focuses on API safety and performance, ignores tests/examples

enabled: true
exclude_paths:
  - vendor/
  - testdata/
  - examples/
  - _test.go
  
severity:
  min_level: medium  # Only medium and high issues

# Focus on performance and safety
loop:
  enabled: true
  check_string_range: true
  check_nested_loops: true
  max_nested_depth: 3
  check_expensive_in_loops: true

complexity:
  enabled: true
  max_cyclomatic_depth: 15  # More lenient for libraries
  max_cognitive_depth: 20
  check_recursion: false  # Libraries may use recursion

memory:
  enabled: true
  check_leaks: true
  check_allocations: true
  max_alloc_per_function: 200  # Libraries may allocate more
  check_map_size: false
  check_slice_capacity: true

context:
  enabled: true
  check_position: true
  check_background_usage: false  # Libraries may not use context
  check_string_keys: false
  check_cancellation: true

channel:
  enabled: true
  check_deadlocks: true
  check_unbuffered: false  # Design choice
  check_multiple_close: true
  check_send_on_closed: true
  default_buffer_size: 1

race_condition:
  enabled: true
  check_shared_variables: true
  check_map_access: true
  check_slice_append: true
  check_global_modification: false  # Libraries may have globals

error_handling:
  enabled: true
  check_ignored_errors: true
  check_unchecked_errors: false  # Too noisy
  check_error_wrapping: false  # Libraries return raw errors
  check_panic_usage: false  # Some libraries panic by design
  check_error_shadowing: true

http_client:
  enabled: false  # Not all libraries use HTTP

database:
  enabled: false  # Not all libraries use DB

# Disabled for libraries
testing:
  enabled: false

ai_patterns:
  enabled: false