# Strict configuration - максимальная проверка для высококачественного кода
enabled: true
exclude_paths:
  - "vendor/"
  - ".git/"
  - "testdata/"
exclude_types: []
severity:
  min_level: "low"

# Анализ циклов - строгие настройки
loop:
  enabled: true
  check_string_range: true
  check_nested_loops: true
  max_nested_depth: 2  # Строже, чем по умолчанию
  check_expensive_in_loops: true

# Анализ сложности - строгие лимиты
complexity:
  enabled: true
  max_cyclomatic_depth: 5   # Строже
  max_cognitive_depth: 10   # Строже
  check_recursion: true     # Включен
  max_recursion_depth: 5

# Анализ памяти - полная проверка
memory:
  enabled: true
  check_leaks: true
  check_allocations: true
  max_alloc_per_function: 50  # Строже
  check_map_size: true        # Включен
  check_slice_capacity: true

# Анализ контекста - все проверки
context:
  enabled: true
  check_position: true
  check_background_usage: true
  check_string_keys: true
  check_cancellation: true

# Анализ каналов - все проверки
channel:
  enabled: true
  check_deadlocks: true
  check_unbuffered: true
  check_multiple_close: true
  check_send_on_closed: true
  default_buffer_size: 1

# Анализ race condition - все проверки
race_condition:
  enabled: true
  check_shared_variables: true
  check_map_access: true
  check_slice_append: true
  check_global_modification: true

# Анализ обработки ошибок - все проверки
error_handling:
  enabled: true
  check_ignored_errors: true
  check_unchecked_errors: true  # Включен
  check_error_wrapping: true
  check_panic_usage: true
  check_error_shadowing: true

# Анализ HTTP клиентов - все проверки
http_client:
  enabled: true
  check_timeouts: true
  default_timeout_sec: 10  # Строже
  check_default_client: true
  check_body_close: true
  check_connection_limits: true

# Анализ базы данных - все проверки
database:
  enabled: true
  check_sql_injection: true
  check_n_plus_one: true
  check_prepared_stmts: true
  check_context_usage: true
  max_queries_per_function: 3  # Строже

# Анализ тестирования - включен
testing:
  enabled: true
  min_coverage: 85.0           # Высокие требования
  require_benchmarks: true     # Включен
  require_examples: true       # Включен
  check_test_naming: true